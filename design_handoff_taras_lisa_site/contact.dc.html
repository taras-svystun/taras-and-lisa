<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500&f[]=general-sans@400,500,600&display=swap"/>
  <style>
    body{margin:0;background:#FBF7EF;color:#22302A;-webkit-font-smoothing:antialiased;}
    a{color:#2F6E63;text-decoration:none;}
    a:hover{color:#E7A335;}
  </style>
</helmet>
<div style="font-family:'General Sans',sans-serif;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;">

  <nav style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;padding:20px 48px;max-width:1280px;margin:0 auto;width:100%;box-sizing:border-box;">
    <a href="index.dc.html" style="display:flex;align-items:center;gap:10px;">
      <img src="uploads/taras_and_lisa_logo_draft.png" alt="Taras & Lisa" style="height:46px;width:auto;object-fit:contain;"/>
    </a>
    <div style="display:flex;align-items:center;gap:8px;background:#FFFFFFA0;border-radius:999px;padding:6px;flex-wrap:wrap;justify-content:center;">
      <a href="index.dc.html" style="padding:10px 18px;border-radius:999px;color:#22302A;font-size:15px;font-weight:600;">Home</a>
      <a href="about.dc.html" style="padding:10px 18px;border-radius:999px;color:#22302A;font-size:15px;font-weight:600;">About</a>
      <a href="services.dc.html" style="padding:10px 18px;border-radius:999px;color:#22302A;font-size:15px;font-weight:600;">Services</a>
      <a href="it-portfolio.dc.html" style="padding:10px 18px;border-radius:999px;color:#22302A;font-size:15px;font-weight:600;">Portfolio</a>
      <a href="contact.dc.html" style="padding:10px 18px;border-radius:999px;background:#22302A;color:#FBF7EF;font-size:15px;font-weight:600;">Contact</a>
    </div>
  </nav>

  <section style="flex:1;display:flex;align-items:center;justify-content:center;padding:60px 48px;">
    <div style="max-width:560px;text-align:center;position:relative;">
      <svg viewBox="0 0 100 100" style="position:absolute;top:-70px;left:50%;transform:translateX(-50%);width:180px;height:180px;opacity:0.4;z-index:0;">
        <path d="M10,60 C 30,20 50,90 70,50 C 82,25 90,55 96,35" fill="none" stroke="#2F6E63" stroke-width="2" stroke-dasharray="6 6"/>
      </svg>
      <div style="display:inline-block;padding:8px 18px;border-radius:999px;background:#F0E4D0;color:#8a5a1f;font-size:14px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:24px;position:relative;z-index:1;">Get in touch</div>
      <h1 style="font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:44px;line-height:1.1;margin:0 0 20px;position:relative;z-index:1;">Let's talk</h1>
      <p style="font-size:18px;line-height:1.65;color:#3E4C46;margin:0 0 36px;position:relative;z-index:1;">Tell us what you're after — a session, a lesson, a trek, or something in between — and we'll get back to you.</p>
      <a href="mailto:hello@taras-and-lisa.com" style="display:inline-block;padding:18px 40px;border-radius:999px;background:#E7A335;color:#22302A;font-weight:600;font-size:18px;margin-bottom:28px;position:relative;z-index:1;">hello@taras-and-lisa.com</a>
      <div style="display:flex;gap:14px;justify-content:center;position:relative;z-index:1;">
        <sc-if value="{{ instagramUrl }}">
          <a href="{{ instagramUrl }}" style="width:44px;height:44px;border-radius:999px;background:#22302A;color:#FBF7EF;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">IG</a>
        </sc-if>
        <sc-if value="{{ telegramUrl }}">
          <a href="{{ telegramUrl }}" style="width:44px;height:44px;border-radius:999px;background:#22302A;color:#FBF7EF;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;">TG</a>
        </sc-if>
      </div>
    </div>
  </section>

  <footer style="max-width:1280px;margin:0 auto;padding:48px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;border-top:1px solid #22302A1A;width:100%;box-sizing:border-box;">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="uploads/taras_and_lisa_logo_draft.png" alt="Taras & Lisa" style="height:32px;width:auto;object-fit:contain;"/>
    </div>
    <p style="font-size:14px;color:#3E4C46;margin:0;">© 2026 Taras &amp; Lisa</p>
  </footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    // Placeholders left empty until real social URLs exist — links stay hidden.
    return { instagramUrl: '', telegramUrl: '' };
  }
}
</script>
</body>
</html>
